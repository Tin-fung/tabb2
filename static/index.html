<!DOCTYPE html>
<html lang="zh" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabbit2API 管理面板</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        border: 'hsl(240 3.7% 15.9%)',
        input: 'hsl(240 3.7% 15.9%)',
        ring: 'hsl(240 4.9% 83.9%)',
        background: 'hsl(240 10% 3.9%)',
        foreground: 'hsl(0 0% 98%)',
        primary: { DEFAULT: 'hsl(0 0% 98%)', foreground: 'hsl(240 5.9% 10%)' },
        muted: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(240 5% 64.9%)' },
        accent: { DEFAULT: 'hsl(240 3.7% 15.9%)', foreground: 'hsl(0 0% 98%)' },
        destructive: { DEFAULT: 'hsl(0 62.8% 30.6%)', foreground: 'hsl(0 0% 98%)' },
        card: { DEFAULT: 'hsl(240 10% 3.9%)', foreground: 'hsl(0 0% 98%)' },
      }
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .status-active { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
  .status-error { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
  .status-unknown { background: #71717a; }
  .status-cooldown { background: #eab308; box-shadow: 0 0 6px #eab30888; }
  .fade-in { animation: fadeIn .2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px hsl(240 4.9% 83.9% / 0.3); }
  .nav-item { transition: background .15s, color .15s; }
  .nav-item:hover { background: hsl(240 3.7% 15.9%); }
  .nav-item.active { background: hsl(240 3.7% 15.9%); color: hsl(0 0% 98%); }

  /* 移动端侧边栏 */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 40;
    backdrop-filter: blur(4px);
  }
  .sidebar-overlay.active { display: block; }

  @media (max-width: 768px) {
    .sidebar-mobile {
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      z-index: 50;
    }
    .sidebar-mobile.active {
      transform: translateX(0);
    }
    .main-content {
      margin-left: 0 !important;
      padding: 1rem !important;
    }
    /* 移动端表格容器 */
    .table-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* 移动端按钮触摸优化 */
    .touch-target {
      min-height: 44px;
      min-width: 44px;
    }
  }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

<div id="app"></div>

<script>
const API = '/api/admin';
let token = localStorage.getItem('admin_token') || '';
let currentPage = 'dashboard';
let autoRefreshTimer = null;
let lastDiagResult = null; // 缓存诊断结果，切页面后恢复

// ── Fetch helpers ──

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) {
    token = '';
    localStorage.removeItem('admin_token');
    render();
    throw new Error('unauthorized');
  }
  // 防御：非 JSON 响应（如 500 错误页）不直接 res.json() 炸掉
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); }
  catch (e) {
    // 非 JSON，提取状态码 + 响应片段给出可读错误
    const snippet = text.slice(0, 200).replace(/\s+/g, ' ').trim();
    throw new Error(`HTTP ${res.status}: ${snippet || res.statusText}`);
  }
  if (!res.ok) throw new Error(data.detail || data.error || `HTTP ${res.status}`);
  return data;
}

// ── Router ──

function navigate(page) {
  currentPage = page;
  if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
  render();
}

function render() {
  const app = document.getElementById('app');
  if (!token) { app.innerHTML = loginPage(); bindLogin(); return; }
  app.innerHTML = layout();
  bindNav();
  loadPage();
}

// ── Login ──

function loginPage() {
  return `
  <div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <div class="rounded-xl border border-zinc-800 bg-zinc-900 p-8 shadow-2xl fade-in">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-zinc-800 mb-4">
            <svg class="w-6 h-6 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h1 class="text-xl font-semibold">Tabbit2API</h1>
          <p class="text-sm text-zinc-400 mt-1">管理面板登录</p>
        </div>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-zinc-400 mb-1.5">密码</label>
            <input id="loginPwd" type="password" placeholder="输入管理密码" autocomplete="current-password"
              class="w-full rounded-lg border border-zinc-700 bg-zinc-800 px-3 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 focus:border-zinc-600">
          </div>
          <button type="submit" class="w-full rounded-lg bg-zinc-100 px-4 py-2.5 text-sm font-medium text-zinc-900 hover:bg-zinc-200 transition-colors">
            登录
          </button>
          <p id="loginErr" class="text-sm text-red-400 text-center hidden"></p>
        </form>
      </div>
    </div>
  </div>`;
}

function bindLogin() {
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('loginPwd').value;
    const errEl = document.getElementById('loginErr');
    try {
      const data = await fetch(API + '/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      }).then(r => r.json());
      if (data.token) {
        token = data.token;
        localStorage.setItem('admin_token', token);
        currentPage = 'dashboard';
        render();
      } else {
        errEl.textContent = data.detail || '登录失败';
        errEl.classList.remove('hidden');
      }
    } catch {
      errEl.textContent = '连接失败';
      errEl.classList.remove('hidden');
    }
  };
}

// ── Layout ──

const navItems = [
  { id: 'dashboard', label: 'Dashboard', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>' },
  { id: 'tokens', label: 'Tokens', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>' },
  { id: 'settings', label: 'Settings', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>' },
  { id: 'logs', label: 'Logs', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>' },
  { id: 'diagnose', label: '诊断', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>' },
  { id: 'quota', label: '额度', icon: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>' },
];

function layout() {
  return `
  <div class="flex min-h-screen">
    <!-- 移动端遮罩层 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="w-64 md:w-56 border-r border-zinc-800 bg-zinc-950 flex flex-col fixed h-screen sidebar-mobile md:transform-none" id="sidebar">
      <div class="p-5 border-b border-zinc-800 flex items-center justify-between">
        <div>
          <h1 class="text-base font-semibold tracking-tight">Tabbit2API</h1>
          <p class="text-xs text-zinc-500 mt-0.5">管理面板</p>
        </div>
        <!-- 移动端关闭按钮 -->
        <button onclick="toggleSidebar()" class="md:hidden p-2 rounded-lg hover:bg-zinc-800 transition-colors">
          <svg class="w-5 h-5 text-zinc-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="flex-1 p-3 space-y-1 overflow-y-auto" id="navList">
        ${navItems.map(n => `
          <button data-page="${n.id}" class="nav-item w-full flex items-center gap-3 px-4 py-3 md:py-2 rounded-lg text-sm touch-target ${currentPage === n.id ? 'active' : 'text-zinc-400'}">
            <svg class="w-5 h-5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">${n.icon}</svg>
            ${n.label}
          </button>
        `).join('')}
      </nav>
      <div class="p-3 border-t border-zinc-800">
        <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 md:py-2 rounded-lg text-sm text-zinc-400 hover:bg-zinc-900 hover:text-zinc-300 transition-colors touch-target">
          <svg class="w-5 h-5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          退出登录
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="flex-1 ml-0 md:ml-56 p-4 md:p-8 main-content" id="mainContent">
      <!-- 移动端顶部栏 -->
      <div class="md:hidden flex items-center justify-between mb-4">
        <button onclick="toggleSidebar()" class="p-2 rounded-lg hover:bg-zinc-800 transition-colors touch-target">
          <svg class="w-6 h-6 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 class="text-sm font-semibold text-zinc-300">Tabbit2API</h1>
        <div class="w-10"></div>
      </div>
      <div class="max-w-6xl mx-auto fade-in" id="pageContent"></div>
    </main>
  </div>`;
}

function bindNav() {
  document.querySelectorAll('#navList button').forEach(btn => {
    btn.onclick = () => {
      navigate(btn.dataset.page);
      // 移动端点击导航后关闭侧边栏
      if (window.innerWidth < 768) {
        toggleSidebar(false);
      }
    };
  });
}

function toggleSidebar(show) {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  if (show === undefined) {
    show = !sidebar.classList.contains('active');
  }
  if (show) {
    sidebar.classList.add('active');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  } else {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
    document.body.style.overflow = '';
  }
}

function logout() {
  token = '';
  localStorage.removeItem('admin_token');
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  render();
}

// ── Pages ──

async function loadPage() {
  const el = document.getElementById('pageContent');
  try {
    switch (currentPage) {
      case 'dashboard': await renderDashboard(el); break;
      case 'tokens': await renderTokens(el); break;
      case 'settings': await renderSettings(el); break;
      case 'logs': await renderLogs(el); break;
      case 'diagnose': await renderDiagnose(el); break;
      case 'quota': await renderQuota(el); break;
    }
  } catch (e) {
    el.innerHTML = `<div class="text-red-400">加载失败: ${e.message}</div>`;
  }
}

// ── Dashboard ──

async function renderDashboard(el) {
  const s = await api('/status');
  el.innerHTML = `
    <h2 class="text-2xl font-semibold mb-6">Dashboard</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      ${statCard('总请求', s.total_requests, 'text-zinc-100')}
      ${statCard('成功', s.total_success, 'text-emerald-400')}
      ${statCard('失败', s.total_errors, 'text-red-400')}
      ${statCard('成功率', s.success_rate + '%', 'text-blue-400')}
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-8">
      ${miniCard('Token 总数', s.total_tokens)}
      ${miniCard('活跃 Token', s.active_tokens)}
    </div>
    <div class="rounded-xl border border-zinc-800 bg-zinc-900">
      <div class="px-4 md:px-5 py-4 border-b border-zinc-800">
        <h3 class="text-sm font-medium">最近请求</h3>
      </div>
      <div class="overflow-x-auto table-container">
        <table class="w-full text-sm">
          <thead><tr class="text-zinc-400 text-left border-b border-zinc-800">
            <th class="px-3 md:px-5 py-3 font-medium whitespace-nowrap">时间</th>
            <th class="px-3 md:px-5 py-3 font-medium">模型</th>
            <th class="px-3 md:px-5 py-3 font-medium">Token</th>
            <th class="px-3 md:px-5 py-3 font-medium">状态</th>
            <th class="px-3 md:px-5 py-3 font-medium">耗时</th>
          </tr></thead>
          <tbody>
            ${s.recent_logs.map(l => `<tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30">
              <td class="px-3 md:px-5 py-3 text-zinc-400 whitespace-nowrap">${fmtTime(l.timestamp)}</td>
              <td class="px-3 md:px-5 py-3">${l.model}</td>
              <td class="px-3 md:px-5 py-3 text-zinc-400">${l.token_name}</td>
              <td class="px-3 md:px-5 py-3">${statusBadge(l.status)}</td>
              <td class="px-3 md:px-5 py-3 text-zinc-400">${l.duration}s</td>
            </tr>`).join('') || '<tr><td colspan="5" class="px-5 py-8 text-center text-zinc-500">暂无请求记录</td></tr>'}
          </tbody>
        </table>
      </div>
    </div>`;
}

function statCard(label, value, colorClass) {
  return `
  <div class="rounded-xl border border-zinc-800 bg-zinc-900 p-4 md:p-5">
    <p class="text-xs md:text-sm text-zinc-400 mb-1">${label}</p>
    <p class="text-xl md:text-2xl font-semibold ${colorClass}">${value}</p>
  </div>`;
}

function miniCard(label, value) {
  return `
  <div class="rounded-xl border border-zinc-800 bg-zinc-900 p-5 flex items-center justify-between">
    <span class="text-sm text-zinc-400">${label}</span>
    <span class="text-lg font-semibold">${value}</span>
  </div>`;
}

// ── Tokens ──

async function renderTokens(el) {
  const data = await api('/tokens');
  el.innerHTML = `
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
      <h2 class="text-2xl font-semibold">Tokens</h2>
      <div class="flex flex-wrap items-center gap-2">
        <button onclick="showGoogleLogin()" class="inline-flex items-center gap-2 rounded-lg border border-zinc-700 px-4 py-2.5 text-sm hover:bg-zinc-800 transition-colors touch-target">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google 登录
        </button>
        <button onclick="showAddToken()" class="inline-flex items-center gap-2 rounded-lg bg-zinc-100 px-4 py-2.5 text-sm font-medium text-zinc-900 hover:bg-zinc-200 transition-colors touch-target">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          添加 Token
        </button>
      </div>
    </div>
    <div id="tokenModal"></div>
    <div class="rounded-xl border border-zinc-800 bg-zinc-900">
      <div class="overflow-x-auto table-container">
        <table class="w-full text-sm">
          <thead><tr class="text-zinc-400 text-left border-b border-zinc-800">
            <th class="px-3 md:px-5 py-3 font-medium">状态</th>
            <th class="px-3 md:px-5 py-3 font-medium">名称</th>
            <th class="px-3 md:px-5 py-3 font-medium hidden sm:table-cell">Token</th>
            <th class="px-3 md:px-5 py-3 font-medium">请求数</th>
            <th class="px-3 md:px-5 py-3 font-medium hidden md:table-cell">错误</th>
            <th class="px-3 md:px-5 py-3 font-medium hidden lg:table-cell">最后使用</th>
            <th class="px-3 md:px-5 py-3 font-medium text-right">操作</th>
          </tr></thead>
          <tbody>
            ${data.tokens.map(t => `<tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30" data-id="${t.id}">
              <td class="px-3 md:px-5 py-3"><span class="status-dot status-${t.status}"></span></td>
              <td class="px-3 md:px-5 py-3 font-medium">${esc(t.name)}</td>
              <td class="px-3 md:px-5 py-3 text-zinc-400 font-mono text-xs hidden sm:table-cell">${esc(t.value_preview)}</td>
              <td class="px-3 md:px-5 py-3">${t.total_requests}</td>
              <td class="px-3 md:px-5 py-3 ${t.error_count > 0 ? 'text-red-400' : ''} hidden md:table-cell">${t.error_count}</td>
              <td class="px-3 md:px-5 py-3 text-zinc-400 hidden lg:table-cell">${t.last_used_at ? fmtTime(t.last_used_at) : '-'}</td>
              <td class="px-3 md:px-5 py-3 text-right space-x-1">
                <button onclick="testToken('${t.id}')" class="inline-flex items-center rounded-md bg-zinc-800 px-2.5 py-2 text-xs hover:bg-zinc-700 transition-colors touch-target" title="测试">

function openGoogleOAuth() {
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'openid email profile',
    response_type: 'id_token',
    redirect_uri: 'gis_transform',
    response_mode: 'form_post',
    origin: TABBIT_ORIGIN,
    display: 'popup',
    prompt: 'select_account',
    gsiwebsdk: 'gis_attributes',
  });
  window.open(
    'https://accounts.google.com/o/oauth2/v2/auth?' + params,
    'google_login',
    'width=520,height=700,left=200,top=80'
  );
}

function submitGoogleIdToken() {
  const val = document.getElementById('glManualToken').value.trim();
  if (!val) return alert('请先粘贴 id_token');
  exchangeGoogleToken(val);
}

async function exchangeGoogleToken(id_token) {
  const step1 = document.getElementById('glStep1');
  const result = document.getElementById('glResult');
  step1.innerHTML = '<div class="flex items-center gap-3 py-6"><svg class="w-5 h-5 animate-spin text-zinc-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg><span class="text-sm text-zinc-300">正在换取 Tabbit Token...</span></div>';

  try {
    const data = await api('/tokens/google-login', {
      method: 'POST',
      body: JSON.stringify({ id_token })
    });

    step1.style.display = 'none';
    result.style.display = 'block';

    const name = (document.getElementById('glName') ? document.getElementById('glName').value.trim() : '') || 'Google Account';

    result.innerHTML = `
      <div class="rounded-lg bg-emerald-900/30 border border-emerald-800/50 p-4 mb-3">
        <p class="text-sm text-emerald-400 font-medium mb-1">Token 获取成功!</p>
        <p class="text-xs text-zinc-400 font-mono break-all">${esc(data.token_value).substring(0, 60)}...</p>
      </div>
      <button onclick="saveGoogleToken('${esc(name)}', '${esc(data.token_value)}')" class="w-full rounded-lg bg-zinc-100 px-4 py-2.5 text-sm font-medium text-zinc-900 hover:bg-zinc-200 transition-colors">
        保存为 "${esc(name)}"
      </button>`;
  } catch (e) {
    step1.style.display = 'none';
    result.style.display = 'block';
    result.innerHTML = `<div class="rounded-lg bg-red-900/30 border border-red-800/50 p-4"><p class="text-sm text-red-400">${esc(e.message)}</p></div>`;
  }
}

async function saveGoogleToken(name, value) {

// 查询上游最新版本（读 appcast.xml），对比当前配置
async function checkLatestVersion() {
  const btn = document.getElementById('checkVerBtn');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '查询中...';
  try {
    const r = await api('/version');
    if (!r.ok) {
      alert('查询失败: ' + (r.error || '未知错误') + '\n\n可手动运行 check_tabbit_version.sh 查本机 Tabbit 版本');
      return;
    }
    const cur = r.current, lat = r.latest;
    if (r.is_latest === true) {
      let msg = `✅ 版本已是最新\n\n当前: ${cur.browser_version}(${cur.sparkle_version})\n最新: ${lat.browser_version}(${lat.sparkle_version})`;
      if (r.pub_date) msg += `\n发布日期: ${r.pub_date}`;
      alert(msg);
    } else if (r.is_latest === false && lat.browser_version) {
      let msg = `⚠️ Tabbit 已更新！\n\n当前: ${cur.browser_version}(${cur.sparkle_version})\n最新: ${lat.browser_version}(${lat.sparkle_version || '?'})`;
      if (r.pub_date) msg += `\n发布日期: ${r.pub_date}`;
      if (r.release_notes) msg += `\n\n更新说明:\n${r.release_notes}`;
      msg += `\n\n版本过期会导致 x-req-ctx 校验失败触发 493。`;
      const apply = confirm(msg + '\n\n是否自动填入最新版本号？（填入后还需点"保存设置"）');
      if (apply) {
        document.getElementById('sBrowserVersion').value = lat.browser_version;
        if (lat.sparkle_version) document.getElementById('sSparkleVersion').value = lat.sparkle_version;
        alert('已填入最新版本号，请点击"保存设置"并重启容器');
      }
    } else {
      alert(`❓ 未能识别最新版本\n\n当前: ${cur.browser_version}(${cur.sparkle_version})\nappcast: ${r.appcast_url}\n\n建议本机运行 check_tabbit_version.sh`);
    }
  } catch (e) {
    alert('查询失败: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

async function changePassword() {
  const old_password = document.getElementById('pwOld').value;
  const new_password = document.getElementById('pwNew').value;
  if (!old_password || !new_password) return alert('请填写完整');
  try {
    await api('/password', { method: 'PUT', body: JSON.stringify({ old_password, new_password }) });
    alert('密码已修改');
    document.getElementById('pwOld').value = '';
    document.getElementById('pwNew').value = '';
  } catch (e) { alert('修改失败: ' + e.message); }
}

  }
  const rows = r.results.map(res => {

    }
    const q = res.quota || {};
    // 额度结构因版本而异，尽量提取关键字段，兜底显示原始 JSON
    const cards = renderQuotaCards(q);
    return `<div class="rounded-xl border border-zinc-800 bg-zinc-900 p-5 mb-3">

function renderQuotaCards(q) {
  // Tabbit 额度结构（真机抓包确认）：
  // { member_level, usage_percentage, remaining_reset_hours, current_cycle_start/end, ... }
  // member_level: free | pro（默认浏览器伪装 → pro = 5x quota）
  const level = q.member_level || q.level || '';
  const isPro = String(level).toLowerCase() === 'pro';
  const usagePct = parseFloat(String(q.usage_percentage || q.usage || '0').replace('%', '')) || 0;
  const remainHours = q.remaining_reset_hours ?? q.reset_hours;
  const cycleStart = q.current_cycle_start || q.cycle_start;
  const cycleEnd = q.current_cycle_end || q.cycle_end;
  const couponCount = q.unused_reset_coupon_count ?? q.reset_coupon_count;

  // 会员等级徽章
  let html = `<div class="flex items-center gap-3 mb-4">
    <span class="text-xs text-zinc-500">会员等级</span>
    <span class="text-sm font-semibold px-3 py-1 rounded-full ${isPro ? 'bg-gradient-to-r from-amber-500/20 to-pink-500/20 text-amber-300 border border-amber-500/30' : 'bg-zinc-800 text-zinc-400'}">
      ${isPro ? '⭐ PRO' : 'FREE'}
    </span>
    ${isPro ? '<span class="text-xs text-emerald-400">✓ 默认浏览器伪装生效</span>' : '<span class="text-xs text-zinc-500">未生效（检查 default_browser 开关）</span>'}
  </div>`;

  // 用量进度条
  if (usagePct > 0 || q.usage_percentage != null) {
    const barColor = usagePct >= 90 ? 'bg-red-500' : usagePct >= 70 ? 'bg-yellow-500' : 'bg-emerald-500';
    const textColor = usagePct >= 90 ? 'text-red-400' : usagePct >= 70 ? 'text-yellow-400' : 'text-emerald-400';
    html += `
    <div class="mb-4">
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm text-zinc-300">本周期用量</span>
        <span class="text-sm font-medium ${textColor}">${usagePct.toFixed(2)}%</span>
      </div>
      <div class="h-2 rounded-full bg-zinc-800 overflow-hidden">
        <div class="h-full ${barColor} rounded-full transition-all" style="width: ${Math.min(usagePct, 100)}%"></div>
      </div>
    </div>`;
  }

  // 周期信息网格
  const infoItems = [];
  if (cycleStart && cycleEnd) infoItems.push(['计费周期', `${cycleStart} ~ ${cycleEnd}`]);
  if (remainHours != null) infoItems.push(['距下次重置', `${remainHours} 小时`]);
  if (couponCount != null) infoItems.push(['可用重置券', `${couponCount} 张`]);
  if (q.user_id) infoItems.push(['账号 ID', q.user_id]);
  if (infoItems.length) {
    html += `<div class="grid grid-cols-2 gap-3 mt-4 pt-4 border-t border-zinc-800">
      ${infoItems.map(([k, v]) => `
        <div>
          <div class="text-xs text-zinc-500 mb-0.5">${esc(k)}</div>
          <div class="text-sm text-zinc-200 font-mono break-all">${esc(String(v))}</div>
        </div>`).join('')}
    </div>`;
  }
  return html || '<p class="text-xs text-zinc-500">（未识别到结构化额度字段，看原始响应）</p>';
}

function flattenQuota(obj, prefix = '') {
  // 兜底：递归找 used/total 配对（适配未来结构变化）
  const out = [];
  if (!obj || typeof obj !== 'object') return out;
  if (Array.isArray(obj)) {
    obj.forEach((v, i) => out.push(...flattenQuota(v, `${prefix}[${i}]`)));
    return out;
  }
  const used = obj.used ?? obj.usage ?? obj.consume ?? obj.consumed;
  const total = obj.total ?? obj.limit ?? obj.quota ?? obj.max;
  if (used != null && total != null) {
    const ratio = total > 0 ? (used / total) : 0;
    out.push({ label: prefix || '额度', used, total, ratio, unit: obj.unit || '' });
  }
  for (const k of Object.keys(obj)) {
    if (typeof obj[k] === 'object' && obj[k] !== null) {
      out.push(...flattenQuota(obj[k], prefix ? `${prefix}.${k}` : k));
    }
  }
  return out;
}

// ── Helpers ──

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function fmtTime(ts) {
  if (!ts) return '-';
  try {
    const d = new Date(ts);
    return d.toLocaleString('zh-CN', { hour12: false, month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch { return ts; }
}

function statusBadge(s) {
  const colors = { success: 'bg-emerald-900/50 text-emerald-400', error: 'bg-red-900/50 text-red-400', pending: 'bg-zinc-800 text-zinc-400' };
  return `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium ${colors[s] || colors.pending}">${s}</span>`;
}

// ── Init ──

render();
</script>
</body>
